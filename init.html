<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>GazeIQ Optics Setup</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Outfit', sans-serif;
      text-align: center;
      background-color: #0f131a;
      background-image: radial-gradient(circle at 50% 50%, rgba(138, 43, 226, 0.1), transparent 60%);
      color: white;
      padding: 10vmin;
      margin: 0;
      height: 100vh;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      padding: 40px;
      border-radius: 24px;
      max-width: 500px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }
    h1 {
      font-size: 2.5em;
      margin-top: 0;
      background: linear-gradient(135deg, #00f2fe, #8a2be2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      color: #8b949e;
      font-size: 1.1em;
      line-height: 1.6;
      margin-bottom: 30px;
    }
    button {
      background: linear-gradient(135deg, #8a2be2, #5a189a);
      border: none;
      color: white;
      padding: 16px 40px;
      font-size: 18px;
      cursor: pointer;
      border-radius: 12px;
      font-weight: 600;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(138, 43, 226, 0.3);
      font-family: inherit;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(138, 43, 226, 0.5);
    }
    .error { color: #ff4b4b; margin-top: 20px; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Initialize Optics</h1>
    <p>GazeIQ requires secure, local camera access to run the neural engine directly in your browser. No video is ever recorded or transmitted.</p>
    <button id="grantBtn">Authorize Hardware</button>
    <p id="errorMsg" class="error"></p>
  </div>
  <script src="init.js"></script>
</body>
</html>
