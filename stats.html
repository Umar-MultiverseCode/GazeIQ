<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>GazeIQ Analytics - Neuro Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="stats.css">
</head>
<body>
  <div class="video-bg"></div>
  <div class="container">
    <header>
      <h1>GazeIQ Analytics</h1>
      <p>Your Neural Engagement Metrics</p>
    </header>

    <div class="controls">
      <div class="date-wrapper">
        <input type="date" id="datePicker">
      </div>
      <button id="refreshBtn">
        <svg fill="currentColor" viewBox="0 0 24 24" width="18" height="18"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
        Sync Data
      </button>
      <button id="exportBtn" style="background: linear-gradient(135deg, #00f2fe, #4facfe); color: #000;">
        <svg fill="currentColor" viewBox="0 0 24 24" width="18" height="18"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
        Export CSV
      </button>
    </div>

    <div id="statsContainer" class="stats-grid">
      <!-- Dynamic content will be injected here -->
    </div>
    
    <div class="details-card">
      <h2>Session Breakdown</h2>
      <div id="detailsContainer" class="details-list">
        <!-- Detailed breakdown -->
      </div>
    </div>
  </div>

  <script src="stats.js"></script>
</body>
</html>
