<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>GazeIQ Settings</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f131a;
      --glass: rgba(255, 255, 255, 0.03);
      --border: rgba(255, 255, 255, 0.08);
      --primary: #8a2be2;
      --primary-hover: #9d4edd;
      --accent: #00f2fe;
      --text: #ffffff;
      --text-muted: #8b949e;
    }
    body {
      font-family: 'Outfit', sans-serif;
      width: 280px;
      margin: 0;
      padding: 20px;
      background-color: var(--bg);
      background-image: radial-gradient(circle at 50% 0%, rgba(138, 43, 226, 0.15), transparent 70%);
      color: var(--text);
      text-align: center;
    }
    h1 {
      font-size: 1.8em;
      margin: 0 0 5px 0;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    p {
      font-size: 0.85em;
      color: var(--text-muted);
      margin-bottom: 20px;
      line-height: 1.4;
    }
    button {
      background: var(--glass);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px;
      font-size: 14px;
      margin: 8px 0;
      cursor: pointer;
      border-radius: 12px;
      font-weight: 600;
      width: 100%;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: 'Outfit', sans-serif;
      backdrop-filter: blur(10px);
    }
    button:hover:not(:disabled) {
      background: var(--primary);
      border-color: var(--primary-hover);
      box-shadow: 0 4px 15px rgba(138, 43, 226, 0.4);
      transform: translateY(-2px);
    }
    button:disabled {
      background: rgba(255,255,255,0.02);
      color: #555;
      border-color: rgba(255,255,255,0.02);
      cursor: not-allowed;
    }
    #toggleBtn {
      background: linear-gradient(135deg, var(--primary), #5a189a);
      border: none;
      box-shadow: 0 4px 15px rgba(138, 43, 226, 0.3);
    }
    #toggleBtn:hover:not(:disabled) {
      background: linear-gradient(135deg, var(--primary-hover), var(--primary));
    }
    .toggle-container {
      margin: 15px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: var(--glass);
      padding: 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
    }
    input[type="checkbox"] {
      accent-color: var(--accent);
      width: 16px;
      height: 16px;
      cursor: pointer;
    }
    label {
      font-size: 0.85em;
      cursor: pointer;
      color: #ccc;
    }
    .status {
      margin-top: 15px;
      font-size: 0.8em;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .debug-box {
      margin-top: 15px;
      background: rgba(0,0,0,0.5);
      border: 1px solid var(--border);
      padding: 10px;
      font-size: 10px;
      color: var(--accent);
      border-radius: 8px;
      text-align: left;
      font-family: monospace;
      min-height: 20px;
      word-wrap: break-word;
    }
  </style>
</head>
<body>
  <h1>GazeIQ</h1>
  <p>Next-gen AI playback control.</p>
  
  <button id="cameraBtn">Initialize Optics</button>
  <button id="toggleBtn" disabled>Activate GazeIQ</button>
  
  <div class="toggle-container">
    <input type="checkbox" id="showOverlay">
    <label for="showOverlay">Live Neural Overlay</label>
  </div>
  
  <button id="dashboardBtn">Neuro Dashboard</button>
  
  <div class="status" id="statusText">System Standby</div>
  
  <div class="debug-box" id="debugText">Awaiting telemetry...</div>

  <script src="menu.js"></script>
</body>
</html>
